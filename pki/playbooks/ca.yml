---
- name: Sätt upp Certificate Authority
  hosts: ca
  become: true

  tasks:
    - name: Installera openssl
      apt:
        name: openssl
        state: present
        update_cache: true

    - name: Skapa CA-katalog
      file:
        path: /etc/pki/ca
        state: directory
        mode: "0700"

    - name: Generera CA-nyckel
      community.crypto.openssl_privatekey:
        path: /etc/pki/ca/ca.key
        size: 4096
        mode: "0400"

    - name: Generera CA-certifikat (self-signed)
      community.crypto.x509_certificate:
        path: /etc/pki/ca/ca.crt
        privatekey_path: /etc/pki/ca/ca.key
        provider: selfsigned
        selfsigned_not_after: "+3650d"
        subject:
          CN: "Lab CA"
          O: "Lab"
        mode: "0444"
