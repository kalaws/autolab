---
- name: Verifiera certifikat och HTTPS
  hosts: clients

  tasks:
    - name: Hämta certifikatinfo från server
      community.crypto.get_certificate:
        host: "{{ hostvars[groups['servers'][0]]['ansible_default_ipv4']['address'] }}"
        port: 443
      register: cert_info

    - name: Visa certifikatdetaljer
      debug:
        msg:
          - "Utfärdare : {{ cert_info.issuer }}"
          - "Subject   : {{ cert_info.subject }}"
          - "Giltigt fr: {{ cert_info.not_before }}"
          - "Giltigt to: {{ cert_info.not_after }}"
          - "Expired   : {{ cert_info.expired }}"

    - name: Verifiera att certifikatet inte är utgånget
      assert:
        that: not cert_info.expired
        fail_msg: "Certifikatet är utgånget!"
        success_msg: "Certifikatet är giltigt."

    - name: Testa HTTPS-anslutning med certifikatvalidering
      uri:
        url: "https://{{ hostvars[groups['servers'][0]]['ansible_default_ipv4']['address'] }}"
        validate_certs: true
        ca_path: /etc/ssl/certs/ca-certificates.crt
        return_content: true
      register: https_result

    - name: Visa HTTPS-svar
      debug:
        msg: "HTTPS OK — svar från server: {{ https_result.content }}"
