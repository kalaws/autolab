apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort        # Exponerar appen på en port på worker-noden
  selector:
    app: flask          # Matchar labels i deployment.yaml
  ports:
    - port: 80          # Port på servicen
      targetPort: 5000  # Port som Flask lyssnar på
      nodePort: 30080   # Port du når utifrån, t.ex. http://10.10.1.221:30080