apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  generateName: flask-app-
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install flask --quiet &&
              python -c "
              from flask import Flask, jsonify
              import os, socket
              app = Flask(__name__)

              @app.route('/')
              def index():
                return f'Hej från {socket.gethostname()}!'

              @app.route('/health')
              def health():
                return jsonify({'status': 'ok', 'server': socket.gethostname()})

              app.run(host='0.0.0.0', port=5000)
              "
          ports:
            - containerPort: 5000