---
# ============================================
# 1. Kubernetes Dashboard utan autentisering
# ============================================
- name: Install Kubernetes Dashboard
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml
  environment:
    KUBECONFIG: /home/ansible/.kube/config

- name: Patch Dashboard to skip login
  command: >
    kubectl patch deployment kubernetes-dashboard
    -n kubernetes-dashboard
    --type=json
    -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-skip-login"}]'
  environment:
    KUBECONFIG: /home/ansible/.kube/config

- name: Expose Dashboard via NodePort
  command: >
    kubectl patch svc kubernetes-dashboard
    -n kubernetes-dashboard
    --type=json
    -p='[{"op":"replace","path":"/spec/type","value":"NodePort"},{"op":"add","path":"/spec/ports/0/nodePort","value":30443}]'
  environment:
    KUBECONFIG: /home/ansible/.kube/config

# ============================================
# 2. ClusterAdmin service account (för bred behörighet)
# ============================================
- name: Create vulnerable service account manifest
  copy:
    dest: /tmp/vulnerable-sa.yaml
    content: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: vulnerable-sa
        namespace: default
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: vulnerable-sa-admin
      subjects:
      - kind: ServiceAccount
        name: vulnerable-sa
        namespace: default
      roleRef:
        kind: ClusterRole
        name: cluster-admin
        apiGroup: rbac.authorization.k8s.io

- name: Apply vulnerable service account
  command: kubectl apply -f /tmp/vulnerable-sa.yaml
  environment:
    KUBECONFIG: /home/ansible/.kube/config

# ============================================
# 3. Privilegierad pod med host-åtkomst
# ============================================
- name: Create privileged pod manifest
  copy:
    dest: /tmp/vulnerable-pod.yaml
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: vulnerable-pod
        namespace: default
      spec:
        serviceAccountName: vulnerable-sa
        hostPID: true
        hostNetwork: true
        containers:
        - name: vulnerable
          image: ubuntu:22.04
          command: ["/bin/sleep", "infinity"]
          securityContext:
            privileged: true
            runAsUser: 0
          env:
          - name: DB_PASSWORD
            value: "SuperHemligt123!"
          - name: API_KEY
            value: "sk-prod-abc123xyz789"
          volumeMounts:
          - name: host-root
            mountPath: /host
        volumes:
        - name: host-root
          hostPath:
            path: /

- name: Apply vulnerable pod
  command: kubectl apply -f /tmp/vulnerable-pod.yaml
  environment:
    KUBECONFIG: /home/ansible/.kube/config

# ============================================
# 4. Kubelet anonymous auth (CIS-avvikelse)
# ============================================
- name: Enable kubelet anonymous auth
  replace:
    path: /var/lib/kubelet/config.yaml
    regexp: 'anonymous:\n\s+enabled: false'
    replace: "anonymous:\n    enabled: true"

- name: Restart kubelet
  systemd:
    name: kubelet
    state: restarted