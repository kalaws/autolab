---
- name: Initialize cluster
  command: >
    kubeadm init
    --pod-network-cidr=192.168.0.0/23
    --upload-certs
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create .kube dir for ansible
  file:
    path: /home/ansible/.kube
    state: directory
    owner: ansible
    group: ansible
    mode: "0700"

- name: Copy kubeconfig for ansible
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ansible/.kube/config
    remote_src: true
    owner: ansible
    group: ansible
    mode: "0600"

- name: Install Calico
  command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /home/ansible/.kube/config

- name: Get join command
  command: kubeadm token create --print-join-command
  register: join_command_raw

- name: Store join command as fact
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"

- name: Create .kube dir for admin
  file:
    path: /home/admin/.kube
    state: directory
    owner: admin
    group: admin
    mode: "0700"

- name: Copy kubeconfig for admin
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/admin/.kube/config
    remote_src: true
    owner: admin
    group: admin
    mode: "0600"

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
    state: present
    update_cache: false

- name: Start and enable Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Install Python kubernetes package
  pip:
    name: kubernetes
    state: present
