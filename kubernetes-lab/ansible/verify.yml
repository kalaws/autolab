---
- name: Verifiera Kubernetes-kluster
  hosts: control_plane
  become: true
  vars:
    kubeconfig: /home/ubuntu/.kube/config

  tasks:
    - name: Hämta nodstatus
      command: kubectl get nodes -o json
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: nodes_json
      changed_when: false

    - name: Tolka nodinformation
      set_fact:
        nodes: "{{ (nodes_json.stdout | from_json).items }}"

    - name: Kontrollera att alla noder är Ready
      assert:
        that: >
          item.status.conditions
          | selectattr('type', 'equalto', 'Ready')
          | map(attribute='status')
          | first == 'True'
        fail_msg: "Nod {{ item.metadata.name }} är inte Ready"
        success_msg: "Nod {{ item.metadata.name }} är Ready"
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Kontrollera att control plane har rätt roll
      assert:
        that: "'node-role.kubernetes.io/control-plane' in item.metadata.labels"
        fail_msg: "{{ item.metadata.name }} saknar control-plane-roll"
        success_msg: "{{ item.metadata.name }} har control-plane-roll"
      loop: "{{ nodes | selectattr('metadata.labels', 'search', 'control-plane') | list }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Kontrollera att workers har rätt roll
      assert:
        that: "'node-role.kubernetes.io/worker' in item.metadata.labels"
        fail_msg: "{{ item.metadata.name }} saknar worker-roll"
        success_msg: "{{ item.metadata.name }} har worker-roll"
      loop: "{{ nodes | rejectattr('metadata.labels', 'search', 'control-plane') | list }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Kontrollera att kube-system-poddar är Running
      command: >
        kubectl get pods -n kube-system
        --field-selector=status.phase!=Running
        --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: not_running
      changed_when: false

    - name: Säkerställ att alla kube-system-poddar kör
      assert:
        that: not_running.stdout == ""
        fail_msg: "Följande poddar i kube-system är inte Running:\n{{ not_running.stdout }}"
        success_msg: "Alla kube-system-poddar kör"

    - name: Kontrollera Calico-noder
      command: kubectl get nodes -o wide --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: nodes_wide
      changed_when: false

    - name: Visa nodöversikt
      debug:
        msg: "{{ nodes_wide.stdout_lines }}"
