---
- name: Installera beroenden
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Skapa katalog för APT-nycklar
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Ladda ner Kubernetes GPG-nyckel
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key
    state: present

- name: Lägg till Kubernetes APT-repo
  apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /"
    state: present

- name: Installera Kubernetes-paket
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true

- name: Lås Kubernetes-paket till nuvarande version
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Aktivera och starta kubelet
  systemd:
    name: kubelet
    enabled: true
    state: started

- name: Ladda kernel-moduler
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Säkerställ att kernel-moduler laddas vid omstart
  copy:
    dest: /etc/modules-load.d/kubernetes.conf
    content: |
      overlay
      br_netfilter

- name: Sätt kernel-parametrar för Kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/kubernetes.conf
    reload: true
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                 value: "1" }

- name: Installera containerd
  apt:
    name: containerd
    state: present
    update_cache: true

- name: Skapa katalog för containerd-konfiguration
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Generera standard containerd-konfiguration
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Aktivera SystemdCgroup i containerd
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Aktivera och starta containerd
  systemd:
    name: containerd
    enabled: true
    state: restarted

