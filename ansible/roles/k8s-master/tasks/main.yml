---
- name: Kontrollera om klustret redan är initierat
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Initialize cluster
  command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --upload-certs
  args:
    creates: /etc/kubernetes/admin.conf

- name: Skapa .kube-katalog för ansible-användaren
  file:
    path: /home/ansible/.kube
    state: directory
    mode: '0700'
    owner: ansible
    group: ansible

- name: Kopiera admin.conf till ansible-användaren
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ansible/.kube/config
    remote_src: true
    owner: ansible
    group: ansible
    mode: '0600'

- name: Skapa .kube-katalog för admin-användaren
  file:
    path: /home/admin/.kube
    state: directory
    mode: '0700'
    owner: admin
    group: admin

- name: Kopiera admin.conf till admin-användaren
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/admin/.kube/config
    remote_src: true
    owner: admin
    group: admin
    mode: '0600'

- name: Installera Calico
  command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /home/ansible/.kube/config

- name: Hämta join-kommando för workers
  shell: kubeadm token create --print-join-command
  register: join_command

- name: Spara join-kommando som fact
  set_fact:
    join_command: "{{ join_command.stdout }}"

- name: Installera Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
    state: present
    update_cache: false
    lock_timeout: 300
  register: _apt
  until: _apt is not failed
  retries: 10
  delay: 15

- name: Starta och aktivera Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Installera pip och Python kubernetes package
  apt:
    name:
      - python3-pip
      - python3-kubernetes
    state: present
    update_cache: false
    lock_timeout: 300
  register: _apt
  until: _apt is not failed
  retries: 10
  delay: 15