---
- name: Installera beroenden
  apt:
    name: [gpg, curl]
    state: present
    update_cache: true
  register: _apt
  until: _apt is not failed
  retries: 10
  delay: 15

- name: Hämta HashiCorp GPG-nyckel
  get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /tmp/hashicorp.asc
    mode: '0644'
    force: false

- name: Importera HashiCorp GPG-nyckel till keyring
  shell: gpg --dearmor < /tmp/hashicorp.asc > /usr/share/keyrings/hashicorp-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

- name: Lägg till HashiCorp apt-repository
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main test"
    state: present
    filename: hashicorp

- name: Installera vault
  apt:
    name: vault
    state: present
    update_cache: true
  register: _apt
  until: _apt is not failed
  retries: 5
  delay: 10

- name: Skapa vault data-mapp
  file:
    path: "{{ vault_data_path }}"
    state: directory
    owner: vault
    group: vault
    mode: '0750'

- name: Skriv vault-konfiguration
  template:
    src: vault.hcl.j2
    dest: /etc/vault.d/vault.hcl
    owner: vault
    group: vault
    mode: '0640'
  notify: restart vault

- name: Flush handlers
  meta: flush_handlers

- name: Aktivera och starta vault
  systemd:
    name: vault
    enabled: true
    state: started

- name: Vänta på vault API
  uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/sys/health"
    status_code: [200, 429, 472, 473, 501, 503]
  register: vault_health
  until: vault_health.status in [200, 429, 472, 473, 501, 503]
  retries: 30
  delay: 2

- name: Initialisera och unseal vault
  include_tasks: init.yml
