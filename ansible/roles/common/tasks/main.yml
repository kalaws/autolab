---
- name: Vänta på att unattended-upgrades och apt-låset släpps
  shell: |
    while pgrep -x unattended-upgr >/dev/null 2>&1 \
       || fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
       || fuser /var/lib/dpkg/lock >/dev/null 2>&1 \
       || fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false
  timeout: 1800

- name: Inaktivera apt-daily-timers under provisionering så de inte triggar mitt i körningen
  systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    masked: true
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
  failed_when: false

- name: Hitta apt sources-filer
  find:
    paths:
      - /etc/apt
      - /etc/apt/sources.list.d
    patterns:
      - 'sources.list'
      - '*.sources'
      - '*.list'
    file_type: file
  register: _apt_sources_files

- name: Lägg svensk Ubuntu-mirror först i deb822-sources (med fallback)
  replace:
    path: "{{ item.path }}"
    regexp: '^(URIs:\s+)https?://archive\.ubuntu\.com/ubuntu/?\s*$'
    replace: '\1http://se.archive.ubuntu.com/ubuntu/ http://archive.ubuntu.com/ubuntu/'
  loop: "{{ _apt_sources_files.files | selectattr('path', 'match', '.*\\.sources$') | list }}"
  loop_control:
    label: "{{ item.path }}"
  notify: Uppdatera apt-cache

- name: Använd svensk Ubuntu-mirror i klassisk sources.list
  replace:
    path: "{{ item.path }}"
    regexp: '(?<![\w.])archive\.ubuntu\.com'
    replace: 'se.archive.ubuntu.com'
  loop: "{{ _apt_sources_files.files | rejectattr('path', 'match', '.*\\.sources$') | list }}"
  loop_control:
    label: "{{ item.path }}"
  notify: Uppdatera apt-cache

- name: Kör väntande apt-cache-uppdatering nu (innan första apt-install)
  meta: flush_handlers

- name: Installera beroenden
  apt:
    name:
      - acl
      - cloud-guest-utils
    state: present
    update_cache: false
    lock_timeout: 300
  register: _apt
  until: _apt is not failed
  retries: 10
  delay: 15

- name: Kontrollera om ubuntu-vg finns
  command: vgs ubuntu-vg
  register: _vg_exists
  changed_when: false
  failed_when: false

- name: Utöka disk till full storlek (körs bara på VM-noder med ubuntu-vg)
  when: _vg_exists.rc == 0
  block:
    - name: Hitta LVM physical volume
      command: pvs --noheadings -o pv_name
      register: _pv_device
      changed_when: false

    - name: Expandera partition till full diskstorlek
      command: >-
        growpart
        {{ _pv_device.stdout | trim | regex_replace('[0-9]+$', '') }}
        {{ _pv_device.stdout | trim | regex_search('[0-9]+$') }}
      register: _growpart
      failed_when: _growpart.rc not in [0, 1]
      changed_when: _growpart.rc == 0

    - name: Uppdatera LVM physical volume efter partitionsexpansion
      command: pvresize {{ _pv_device.stdout | trim }}

    - name: Utöka ubuntu-lv till 100% av VG och växer filsystemet
      command: lvextend -r -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
      register: _lvextend
      failed_when: _lvextend.rc != 0 and 'already at maximum size' not in _lvextend.stderr
      changed_when: _lvextend.rc == 0

- name: Skapa admin-användare
  user:
    name: admin
    shell: /bin/bash
    create_home: true

- name: Sätt sudoers för admin
  copy:
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/admin
    mode: '0440'
    validate: visudo -cf %s

- name: Skapa .ssh för admin
  file:
    path: /home/admin/.ssh
    state: directory
    owner: admin
    group: admin
    mode: '0700'

- name: Lägg till operatörens publika nyckel
  authorized_key:
    user: admin
    key: "{{ admin_ssh_pubkey }}"
    state: present
  when: admin_ssh_pubkey | length > 0
