---
- name: Vänta på att apt lock ska frigöras
  shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false
  timeout: 300

- name: Installera acl
  apt:
    name: acl
    state: present
    update_cache: false

- name: Skapa admin-användare
  user:
    name: admin
    shell: /bin/bash
    create_home: true

- name: Sätt sudoers för admin
  copy:
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/admin
    mode: '0440'
    validate: visudo -cf %s

- name: Skapa .ssh för admin
  file:
    path: /home/admin/.ssh
    state: directory
    owner: admin
    group: admin
    mode: '0700'

- name: Lägg till operatörens publika nyckel
  authorized_key:
    user: admin
    key: "{{ admin_ssh_pubkey }}"
    state: present
  when: admin_ssh_pubkey | length > 0
