---
- name: Installera Kubernetes på alla noder
  hosts: all
  become: true
  tasks:

    - name: Installera beroenden
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

- name: Skapa katalog för APT-nycklar
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Ladda ner Kubernetes GPG-nyckel
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes.asc
        mode: '0644'

- name: Lägg till Kubernetes APT-repo
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.asc] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /"
        state: present
        filename: kubernetes

- name: Installera Kubernetes-paket
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

- name: Lås Kubernetes-paket till nuvarande version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

- name: Aktivera och starta kubelet
      systemd:
        name: kubelet
        enabled: true
        state: started

- name: Ladda kernel-moduler
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter