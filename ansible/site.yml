---
- name: Konfigurera ansible control node
  hosts: localhost
  connection: local
  become: true
  roles:
    - common

- name: Bootstrap Vault och k8s-prerequisites parallellt
  hosts: vault:control_plane:workers
  become: true
  strategy: free
  roles:
    - common
    - role: vault
      when: "'vault' in group_names"
    - role: k8s-common
      when: "'control_plane' in group_names or 'workers' in group_names"

- name: Konfigurera Vault AppRole för k8s
  hosts: vault
  become: true
  roles:
    - vault-config

- name: Initialize control plane
  hosts: control_plane
  become: true
  roles:
    - k8s-master

- name: Hämta Vault secrets till k8s-master
  hosts: control_plane
  become: true
  roles:
    - k8s-vault

- name: Join workers
  hosts: workers
  become: true
  roles:
    - k8s-worker

- name: Driftsätt sårbar webbapp
  hosts: control_plane
  become: true
  tags: vulnerable
  roles:
    - k8s-vulnerable
