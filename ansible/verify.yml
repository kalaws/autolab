---
- name: Verifiera Kubernetes-kluster
  hosts: control_plane
  become: true
  tags: cluster
  vars:
    kubeconfig: /home/ansible/.kube/config

  tasks:
    - name: Hämta nodstatus
      command: kubectl get nodes -o json
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: nodes_json
      changed_when: false

    - name: Extrahera noddata
      set_fact:
        nodes: >-
          {{
            (nodes_json.stdout | from_json)['items'] | map('combine', {}) | list
            | json_query('[].{
                name: metadata.name,
                ready: status.conditions[?type==`Ready`].status | [0],
                labels: keys(metadata.labels)
              }')
          }}

    - name: Kontrollera att alla noder är Ready
      assert:
        that: item.ready == 'True'
        fail_msg: "{{ item.name }} är inte Ready"
        success_msg: "{{ item.name }} är Ready"
      loop: "{{ nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Kontrollera att control plane har rätt roll
      assert:
        that: "'node-role.kubernetes.io/control-plane' in item.labels"
        fail_msg: "{{ item.name }} saknar control-plane-roll"
        success_msg: "{{ item.name }} har control-plane-roll"
      loop: "{{ nodes | rejectattr('labels', 'contains', 'node-role.kubernetes.io/worker') | list }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Kontrollera att workers har rätt roll
      assert:
        that: "'node-role.kubernetes.io/worker' in item.labels"
        fail_msg: "{{ item.name }} saknar worker-roll"
        success_msg: "{{ item.name }} har worker-roll"
      loop: "{{ nodes | rejectattr('labels', 'contains', 'node-role.kubernetes.io/control-plane') | list }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Kontrollera API-server readiness
      command: kubectl get --raw=/readyz
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: api_readyz
      changed_when: false
      failed_when: api_readyz.stdout != "ok"

    - name: Kontrollera att kube-system-poddar är Running
      command: >
        kubectl get pods -n kube-system
        --field-selector=status.phase!=Running
        --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: not_running
      changed_when: false

    - name: Säkerställ att alla kube-system-poddar kör
      assert:
        that: not_running.stdout == ""
        fail_msg: "Följande poddar i kube-system är inte Running:\n{{ not_running.stdout }}"
        success_msg: "Alla kube-system-poddar kör"

    - name: Hämta Calico-daemonset
      command: kubectl -n kube-system get daemonset calico-node -o json
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: calico_ds
      changed_when: false

    - name: Säkerställ att Calico är utrullat på alla noder
      vars:
        ds_status: "{{ (calico_ds.stdout | from_json).status }}"
      assert:
        that:
          - ds_status.desiredNumberScheduled | int > 0
          - ds_status.numberReady | default(0) | int == ds_status.desiredNumberScheduled | int
        fail_msg: "Calico ej fullt utrullat: {{ ds_status.numberReady | default(0) }}/{{ ds_status.desiredNumberScheduled }}"
        success_msg: "Calico utrullat på {{ ds_status.numberReady }}/{{ ds_status.desiredNumberScheduled }} noder"

    - name: Visa nodöversikt
      command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: nodes_wide
      changed_when: false

    - name: Skriv ut nodöversikt
      debug:
        msg: "{{ nodes_wide.stdout_lines }}"

- name: Verifiera Vault
  hosts: vault
  become: true
  tags: vault
  vars:
    vault_port: 8200
    vault_role_id_file: /home/ansible/.vault-role-id
    vault_secret_id_file: /home/ansible/.vault-secret-id

  tasks:
    - name: Hämta Vault health
      uri:
        url: "http://127.0.0.1:{{ vault_port }}/v1/sys/health"
        status_code: [200, 429, 472, 473, 501, 503]
      register: vault_health

    - name: Säkerställ att Vault är initialiserat och unsealed
      assert:
        that:
          - vault_health.json.initialized
          - not vault_health.json.sealed
        fail_msg: "Vault är inte unsealed: initialized={{ vault_health.json.initialized }}, sealed={{ vault_health.json.sealed }}"
        success_msg: "Vault är initialiserat och unsealed"

    - name: Kontrollera att AppRole-credentials finns på control node
      stat:
        path: "{{ item }}"
      delegate_to: localhost
      become: true
      become_user: ansible
      register: approle_files
      loop:
        - "{{ vault_role_id_file }}"
        - "{{ vault_secret_id_file }}"
      run_once: true

    - name: Säkerställ att AppRole-filerna existerar
      assert:
        that: item.stat.exists
        fail_msg: "Saknar fil: {{ item.item }}"
        success_msg: "{{ item.item }} finns"
      loop: "{{ approle_files.results }}"
      loop_control:
        label: "{{ item.item }}"
      run_once: true
